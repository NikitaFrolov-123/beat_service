<div class="table-responsive">
  <table class="table table-striped align-middle">
    <thead>
      <tr>
        <th>Название</th>
        <th>Описание</th>
        <th>Цена</th>
      </tr>
    </thead>
    <tbody>
      {% for service in services %}
      <tr>
        <td>{{ service.name }}</td>
        <td>{{ service.description|default:"—" }}</td>
        <td>{{ service.price|default:"—" }}</td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="3" class="text-center text-muted">Нет данных</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
