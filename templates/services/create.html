{% extends 'base.html' %}

{% block title %}Добавить услугу{% endblock %}

{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h1 class="h3 mb-4">Добавить услугу</h1>

            <form method="post" enctype="multipart/form-data">
              {% csrf_token %}

              <div class="mb-3">
                <label class="form-label">Название *</label>
                <input type="text" name="name" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Категория *</label>
                <select name="category" class="form-select" required>
                  <option value="">Выберите категорию</option>
                  {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                  {% endfor %}
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Длительность, мин *</label>
                <input type="number" name="duration" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Цена *</label>
                <input type="number" step="0.01" name="price" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea name="description" class="form-control" rows="4"></textarea>
              </div>

              <div class="mb-3">
                <label class="form-label">Фото услуги</label>
                <input type="file" name="image" class="form-control" accept="image/*">
              </div>

              <div class="mb-3">
                <label class="form-label">Мастера</label>
                <select name="masters" class="form-select" multiple>
                  {% for master in masters %}
                    <option value="{{ master.id }}">{{ master.full_name }}</option>
                  {% endfor %}
                </select>
              </div>

              <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                  Сохранить
                </button>
                <a href="{% url 'beauty_salon:services_list' %}" class="btn btn-outline-secondary">
                  Отмена
                </a>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
