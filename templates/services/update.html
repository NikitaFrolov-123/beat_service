{% extends 'base.html' %}

{% block title %}Редактировать услугу{% endblock %}

{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h1 class="h3 mb-4">Редактировать услугу</h1>

            <form method="post" enctype="multipart/form-data">
              {% csrf_token %}

              <div class="mb-3">
                <label class="form-label">Название *</label>
                <input type="text" name="name" class="form-control" value="{{ service.name }}" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Категория *</label>
                <select name="category" class="form-select" required>
                  {% for category in categories %}
                    <option value="{{ category.id }}" {% if service.category.id == category.id %}selected{% endif %}>
                      {{ category.name }}
                    </option>
                  {% endfor %}
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Длительность, мин *</label>
                <input type="number" name="duration" class="form-control" value="{{ service.duration_minutes }}" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Цена *</label>
                <input type="number" step="0.01" name="price" class="form-control" value="{{ service.price }}" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea name="description" class="form-control" rows="4">{{ service.description }}</textarea>
              </div>

              <div class="mb-3">
                <label class="form-label">Текущее фото</label>
                <div class="mb-2">
                  {% if service.image %}
                    <img src="{{ service.image.url }}" alt="{{ service.name }}" style="max-width: 200px; height: auto;">
                  {% else %}
                    <p class="text-muted mb-0">Фото не загружено</p>
                  {% endif %}
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Заменить фото</label>
                <input type="file" name="image" class="form-control" accept="image/*">
              </div>

              <div class="mb-3">
                <label class="form-label">Мастера</label>
                <select name="masters" class="form-select" multiple>
                  {% for master in masters %}
                    <option value="{{ master.id }}" {% if master.id in selected_masters %}selected{% endif %}>
                      {{ master.full_name }}
                    </option>
                  {% endfor %}
                </select>
              </div>

              <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                  Сохранить
                </button>
                <a href="{% url 'beauty_salon:services_list' %}" class="btn btn-outline-secondary">
                  Отмена
                </a>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
