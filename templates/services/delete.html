{% extends 'base.html' %}

{% block title %}Удалить услугу{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="card p-4 shadow-sm">
    <h1 class="mb-3">Удалить услугу</h1>
    <p>Вы уверены, что хотите удалить услугу <strong>{{ service.name }}</strong>?</p>

    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Удалить</button>
      <a href="{% url 'beauty_salon:services_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
